apiVersion: v1
kind: ConfigMap
metadata:
  name: tts-config
data:
  TTS_DEVICE: cpu
  TTS_MODEL_NAME: tts_models/en/ljspeech/tacotron2-DDC
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tts
  template:
    metadata:
      labels:
        app: tts
    spec:
      containers:
        - name: tts
          image: your-registry/tts:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: tts-config
---
apiVersion: v1
kind: Service
metadata:
  name: tts
spec:
  selector:
    app: tts
  ports:
    - port: 8003
      targetPort: 8003
