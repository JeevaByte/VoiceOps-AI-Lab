apiVersion: v1
kind: ConfigMap
metadata:
  name: stt-config
data:
  STT_WHISPER_DEVICE: cpu
  STT_WHISPER_COMPUTE_TYPE: int8
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stt
  template:
    metadata:
      labels:
        app: stt
    spec:
      containers:
        - name: stt
          image: your-registry/stt:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: stt-config
---
apiVersion: v1
kind: Service
metadata:
  name: stt
spec:
  selector:
    app: stt
  ports:
    - port: 8001
      targetPort: 8001
